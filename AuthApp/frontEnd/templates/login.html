{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — AuthApp</title>
  <link rel="stylesheet" href="{% static 'style.css' %}"/>
</head>
<body class="auth-page" data-page="login">

  <div class="auth-card">

    <div class="brand">
      <div class="brand-icon">A</div>
      <h1>Welcome back</h1>
      <p>Sign in to your account to continue</p>
    </div>


    <div class="divider">or sign in with email</div>

    <!-- Alert area (errors shown here by JS) -->
    <div id="loginAlert" class="alert alert-danger" style="display:none"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input class="field-input" type="email" id="email" name="email"
               placeholder="you@example.com" autocomplete="email" required/>
        <span class="field-error" style="display:none"></span>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="pw-wrap">
          <input class="field-input" type="password" id="password" name="password"
                 placeholder="Your password" autocomplete="current-password" required/>
          <button type="button" class="pw-toggle" id="pwToggle">show</button>
        </div>
        <span class="field-hint">Spaces and hyphens ( - ) are allowed</span>
        <span class="field-error" style="display:none"></span>
      </div>

      <div class="footer-link" style="margin-bottom:1rem">
        <a href="forgot.html">Forgot your password?</a>
      </div>

      <button class="btn btn-primary" type="submit" id="loginBtn">Sign in</button>
    </form>

    <div class="footer-link">
      Don't have an account? <a href="signup.html">Sign up</a>
    </div>

    <!-- SSO buttons — clicking calls ssoLogin() in app.js -->
    <div class="sso-group">
      <button class="btn-sso" id="sso_google" onclick="ssoLogin('google')">
        <svg width="16" height="16" viewBox="0 0 18 18">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908C16.658 14.235 17.64 11.927 17.64 9.2z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <button class="btn-sso" id="sso_microsoft" onclick="ssoLogin('microsoft')">
        <svg width="16" height="16" viewBox="0 0 21 21">
          <path d="M0 0h10v10H0z" fill="#f25022"/>
          <path d="M11 0h10v10H11z" fill="#00a4ef"/>
          <path d="M0 11h10v10H0z" fill="#7fba00"/>
          <path d="M11 11h10v10H11z" fill="#ffb900"/>
        </svg>
        Continue with Microsoft
      </button>
    </div>

  </div>

  <form onsubmit="event.preventDefault(); window.location.href='otp.html';">
</body>
</html>

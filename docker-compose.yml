# _______________________DONT MODIFY THIS FILE_______________________
# ____________ASK FOR THE .env FILE IF YOU DONT HAVE ONE_____________
# _______________THIS IS FOR CONTAINERIZED DEPLOYMENT________________


services:
  auth_app_web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: AuthAppWebInterface
    command: /app/waitForDatabase.sh
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - project_db

  project_db:
    image: postgres:latest
    container_name: AuthAppDB
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - projectDBContents:/var/lib/postgresql
      - ./initializeSchema.sql:/docker-entrypoint-initdb.d/initializeSchema.sql

volumes:
  projectDBContents: